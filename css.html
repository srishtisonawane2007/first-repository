<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stylish CSS Demo</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="assignment.css">

    <!-- Internal CSS -->
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(to right, #f8ffae, #43c6ac);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .card {
            width: 250px;
            padding: 20px;
            margin: 20px ;
            
            border-radius: 15px;
            background-color: white;
        ;
        }
    </style>
</head>

<body>

    <!-- Inline CSS -->
    <h1 style="text-align:center; color:#fff; background:#000; padding:15px;">
        Welcome to Stylish Webpage
    </h1>

    <h2>CSS Types Demo</h2>

    <div class="card">
        Internal CSS Card
    </div>

    <p class="external-style">
        This paragraph is styled using External CSS ✨
    </p>

</body>
</html>
